behaviors:
  SurvivorAgent:
    trainer_type: ppo

    # ── Hyperparameters ──────────────────────────────────────────────────────
    hyperparameters:
      # Larger batch / buffer to get good gradient estimates across many short
      # episodes (agents die quickly at the start of training).
      batch_size: 512
      buffer_size: 10240

      learning_rate: 3.0e-4
      learning_rate_schedule: linear   # decays to 0 over max_steps

      # PPO clip & entropy
      beta: 5.0e-3        # entropy bonus — keeps exploration up early
      epsilon: 0.2
      lambd: 0.95         # GAE lambda
      num_epoch: 3
      shared_critic: false

    # ── Network ──────────────────────────────────────────────────────────────
    network_settings:
      # match3 is ML-Agents' built-in encoder for small grid/board inputs.
      # It uses small CNN kernels with no minimum dimension requirement —
      # making it the correct choice for an 11x11 spatial grid sensor.
      # (simple/nature_cnn require min 20-36px; fully_connected loses spatial structure)
      vis_encode_type: match3

      normalize: false          # no vector obs to normalise
      hidden_units: 256
      num_layers: 2
      use_recurrent: false

    # ── Training length ───────────────────────────────────────────────────────
    max_steps: 5_000_000

    # ── Reward signal ─────────────────────────────────────────────────────────
    reward_signals:
      extrinsic:
        gamma: 0.99     # long-horizon discount — surviving to the end matters
        strength: 1.0

    # ── Logging ───────────────────────────────────────────────────────────────
    # Keeps a snapshot every 500 k steps so you can roll back if needed.
    checkpoint_interval: 500_000
    keep_checkpoints: 5

    # ── Episode horizon ───────────────────────────────────────────────────────
    # Upper bound per episode; the environment also ends episodes via EndEpisode().
    time_horizon: 512
    summary_freq: 10_000
